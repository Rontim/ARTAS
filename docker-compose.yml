# Production Docker Compose
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: artas_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-artas_db}
      POSTGRES_USER: ${POSTGRES_USER:-artas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-artas_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-artas} -d ${POSTGRES_DB:-artas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - artas_network

  redis:
    image: redis:7-alpine
    container_name: artas_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - artas_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artas_backend
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-artas_db}
      - DB_USER=${POSTGRES_USER:-artas}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-artas_secret}
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - artas_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: artas_frontend
    restart: unless-stopped
    networks:
      - artas_network

  nginx:
    image: nginx:alpine
    container_name: artas_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - artas_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  artas_network:
    driver: bridge
